{% extends "base.html" %}
{% block title %}Sign in — Z{% endblock %}
{% block body %}
  <h1>Sign in</h1>
  <p class="muted">Use the same Z account as the CLI. Until Twilio is live, enter code <span class="meta">123456</span>.</p>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="post" action="/login" style="margin-top:1.5rem; max-width:420px">
    <label for="email">Email</label>
    <input id="email" name="email" type="email" required placeholder="you@example.com" />
    <label for="name">Name</label>
    <input id="name" name="name" type="text" placeholder="Optional" />
    <label for="code">One-time code</label>
    <input id="code" name="code" type="text" value="123456" />
    <p style="margin-top:1.5rem"><button class="btn" type="submit">Continue</button></p>
  </form>
{% endblock %}
