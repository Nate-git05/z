[pytest]
norecursedirs = tmp.* build benchmark _site OLD
# Disable noisy/unrelated plugin autoload hints; use -p no:langchain_tests
# locally if a host-installed langchain_tests plugin breaks collection.
addopts = -p no:warnings
testpaths =
    tests/basic
    tests/help
    tests/browser
    tests/scrape

env =
    AIDER_ANALYTICS=false

